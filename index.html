<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title will be loaded from data.json by dataRenderer.js -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen - Star Collision -->
    <div id="loading-screen" class="loading-screen">
        <canvas id="collision-canvas"></canvas>
        <div class="loading-text">
            <!-- Content will be loaded from data.json by dataRenderer.js -->
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="logo" id="site-logo">
            <!-- Logo will be loaded from data.json by dataRenderer.js -->
        </div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="links" id="nav-links">
            <!-- Navigation will be loaded from data.json by dataRenderer.js -->
        </div>
    </nav>

    <section id="hero">
        <div class="hero-content">
            <!-- Content will be loaded from data.json by dataRenderer.js -->
        </div>
        <div class="hero-image-container">
            <div class="hero-image-wrapper">
                <!-- Image will be loaded from data.json by dataRenderer.js -->
            </div>
        </div>

        <!-- Scroll-down comet (click to scroll to next section) -->
        <a href="#about" class="scroll-comet" aria-label="Scroll down">
            <span class="comet" aria-hidden="true"></span>
        </a>
    </section>

    <!-- Mobile-only profile image (separate from hero on small screens) -->
    <div class="mobile-profile fade-in">
        <div class="hero-image-wrapper">
            <!-- Image will be loaded from data.json by dataRenderer.js -->
        </div>
    </div>

    <section id="about" class="container about-section">
        <div class="about-content">
            <!-- Content will be loaded from data.json by dataRenderer.js -->
        </div>
    </section>

    <section id="projects" class="container">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
    </section>

    <section id="skills" class="container">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
        <div class="skills-legend fade-in">
            <span class="legend-item"><span class="legend-dot expert"></span> Expert</span>
            <span class="legend-item"><span class="legend-dot advanced"></span> Advanced</span>
            <span class="legend-item"><span class="legend-dot intermediate"></span> Intermediate</span>
        </div>
    </section>

    <section id="academics" class="container academics-section">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
    </section>

    <section id="certifications" class="container certifications-section">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
    </section>

    <section id="interests" class="container certifications-section">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
    </section>

    <section id="contact" class="container contact-section">
        <!-- Content will be loaded from data.json by dataRenderer.js -->
    </section>

    <footer>
        <!-- Footer will be loaded from data.json by dataRenderer.js -->
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="dataRenderer.js"></script>
    <script src="script.js"></script>
</body>
</html>
